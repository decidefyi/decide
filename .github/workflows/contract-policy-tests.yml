name: Contract + Policy Feed Tests

on:
  push:
    branches:
      - main
      - codex/**
    paths:
      - "api/**"
      - "docs/**"
      - "lib/**"
      - "public/**"
      - "rules/*-policy-sources.json"
      - "scripts/**"
      - "README.md"
      - "middleware.js"
      - "package.json"
      - "server.json"
      - ".github/workflows/contract-policy-tests.yml"
  pull_request:
    paths:
      - "api/**"
      - "docs/**"
      - "lib/**"
      - "public/**"
      - "rules/*-policy-sources.json"
      - "scripts/**"
      - "README.md"
      - "middleware.js"
      - "package.json"
      - "server.json"
      - ".github/workflows/contract-policy-tests.yml"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Run decision contract tests
        run: npm run test:contract

      - name: Run policy feed reliability tests
        run: npm run test:policy-feed

      - name: Run policy checker reliability tests
        run: npm run test:policy-check

      - name: Verify published policy source mirrors
        run: npm run test:public-policy-sources

      - name: Run policy alerts API contract tests
        run: npm run test:policy-alerts-api

      - name: Run Policy MCP contract tests
        run: npm run test:policy-mcp

      - name: Run MCP telemetry and adoption tests
        run: |
          npm run test:mcp-telemetry
          npm run test:mcp-adoption

      - name: Run Zendesk reference workflow tests
        run: npm run workflow:test

      - name: Run public bridge regression tests
        run: npm run test:site-bridge
