name: Contract + Policy Feed Tests

on:
  push:
    branches:
      - main
      - codex/**
    paths:
      - "api/**"
      - "lib/**"
      - "scripts/**"
      - "package.json"
      - ".github/workflows/contract-policy-tests.yml"
  pull_request:
    paths:
      - "api/**"
      - "lib/**"
      - "scripts/**"
      - "package.json"
      - ".github/workflows/contract-policy-tests.yml"
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run decision contract tests
        run: npm run test:contract

      - name: Run policy feed reliability tests
        run: npm run test:policy-feed
