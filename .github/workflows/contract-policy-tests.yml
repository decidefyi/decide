name: Contract + Policy Feed Tests

on:
  push:
    branches:
      - main
      - codex/**
    paths:
      - "api/**"
      - "docs/**"
      - "lib/**"
      - "public/**"
      - "scripts/**"
      - "README.md"
      - "package.json"
      - ".github/workflows/contract-policy-tests.yml"
  pull_request:
    paths:
      - "api/**"
      - "docs/**"
      - "lib/**"
      - "public/**"
      - "scripts/**"
      - "README.md"
      - "package.json"
      - ".github/workflows/contract-policy-tests.yml"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Run decision contract tests
        run: npm run test:contract

      - name: Run policy feed reliability tests
        run: npm run test:policy-feed

      - name: Run policy alerts API contract tests
        run: npm run test:policy-alerts-api
