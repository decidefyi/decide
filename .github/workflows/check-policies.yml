name: Daily Policy Check

on:
  schedule:
    # Run every 6 hours
    - cron: "0 */6 * * *"
  workflow_dispatch: # Allow manual trigger

concurrency:
  group: daily-policy-check-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  issues: write
  pull-requests: write

env:
  POLICY_CHECK_PUBLIC_ISSUES_ENABLED: ${{ vars.POLICY_CHECK_PUBLIC_ISSUES_ENABLED || '0' }}

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Restore latest policy baseline from aggregation branch
        run: |
          set +e
          artifact_branch="policy-updates/aggregate"
          # Restore generated state only. Source configs must come from the checked-out ref.
          files=(
            rules/policy-hashes.json
            rules/cancel-policy-hashes.json
            rules/return-policy-hashes.json
            rules/trial-policy-hashes.json
            rules/policy-alert-feed.json
            rules/policy-alert-review-feed.json
            rules/policy-change-candidates.json
            rules/cancel-policy-change-candidates.json
            rules/return-policy-change-candidates.json
            rules/trial-policy-change-candidates.json
            rules/policy-coverage-state.json
            rules/cancel-policy-coverage-state.json
            rules/return-policy-coverage-state.json
            rules/trial-policy-coverage-state.json
            rules/policy-semantic-state.json
            rules/cancel-policy-semantic-state.json
            rules/return-policy-semantic-state.json
            rules/trial-policy-semantic-state.json
            rules/policy-confirmed-baseline.json
            rules/cancel-policy-confirmed-baseline.json
            rules/return-policy-confirmed-baseline.json
            rules/trial-policy-confirmed-baseline.json
            rules/policy-daily-fingerprints.json
            rules/cancel-policy-daily-fingerprints.json
            rules/return-policy-daily-fingerprints.json
            rules/trial-policy-daily-fingerprints.json
            rules/policy-blocked-retry-queue.json
            rules/cancel-policy-blocked-retry-queue.json
            rules/return-policy-blocked-retry-queue.json
            rules/trial-policy-blocked-retry-queue.json
            rules/policy-events.ndjson
            rules/policy-status-report.json
            rules/policy-status-report.md
            rules/policy-weekly-triage.json
            rules/policy-weekly-triage.md
          )

          git fetch origin "${artifact_branch}" || {
            echo "No aggregation branch baseline available yet."
            exit 0
          }

          restored=0
          for f in "${files[@]}"; do
            if git cat-file -e "origin/${artifact_branch}:${f}" 2>/dev/null; then
              git checkout "origin/${artifact_branch}" -- "$f"
              restored=1
            fi
          done

          if [ "$restored" -eq 1 ]; then
            echo "Restored policy baseline from ${artifact_branch}."
          else
            echo "Aggregation branch exists but baseline files were not found."
          fi

      - name: Check vendor policy pages
        id: check
        continue-on-error: true
        env:
          POLICY_CHECK_BROWSER_HOOK_URL: ${{ secrets.POLICY_CHECK_BROWSER_HOOK_URL || vars.POLICY_CHECK_BROWSER_HOOK_URL || '' }}
          POLICY_CHECK_BROWSER_HOOK_TOKEN: ${{ secrets.POLICY_CHECK_BROWSER_HOOK_TOKEN || vars.POLICY_CHECK_BROWSER_HOOK_TOKEN || '' }}
          POLICY_CHECK_FETCH_LANES_DEFAULT: ${{ vars.POLICY_CHECK_FETCH_LANES_DEFAULT || '' }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL || vars.SUPABASE_URL || '' }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY || vars.SUPABASE_SERVICE_ROLE_KEY || '' }}
          POLICY_SUPABASE_SYNC_ENABLED: ${{ vars.POLICY_SUPABASE_SYNC_ENABLED || '0' }}
          POLICY_SUPABASE_STATE_SYNC_ENABLED: ${{ vars.POLICY_SUPABASE_STATE_SYNC_ENABLED || '0' }}
          POLICY_SUPABASE_SUPPRESS_GIT_STATE: ${{ vars.POLICY_SUPABASE_SUPPRESS_GIT_STATE || '1' }}
        run: |
          set +e
          output=$(node scripts/check-policies.js 2>&1)
          status=$?
          set -e
          echo "$output"

          if [ "$status" -ne 0 ]; then
            echo "::warning::Policy checker exited with code $status (non-blocking)."
          fi

          extract_output_value() {
            local key="$1"
            echo "$output" | sed -n "s/^${key}=//p" | tail -n1 | tr -d '\r'
          }
          actual_changed_count=$(extract_output_value "ACTUAL_CHANGED_COUNT" | tr -d '[:space:]')
          actual_changed_by_policy=$(extract_output_value "ACTUAL_CHANGED_BY_POLICY")
          actual_changed_sample=$(extract_output_value "ACTUAL_CHANGED_SAMPLE")
          actual_diff_sample=$(extract_output_value "ACTUAL_DIFF_SAMPLE")
          changed_count=$(extract_output_value "CHANGED_COUNT" | tr -d '[:space:]')
          changed_by_policy=$(extract_output_value "CHANGED_BY_POLICY")
          changed_sample=$(extract_output_value "CHANGED_SAMPLE")
          pending_count=$(extract_output_value "PENDING_COUNT" | tr -d '[:space:]')
          pending_by_policy=$(extract_output_value "PENDING_BY_POLICY")
          pending_sample=$(extract_output_value "PENDING_SAMPLE")
          pending_detail=$(extract_output_value "PENDING_DETAIL")
          legacy_pending_count=$(extract_output_value "LEGACY_PENDING_COUNT" | tr -d '[:space:]')
          legacy_pending_by_policy=$(extract_output_value "LEGACY_PENDING_BY_POLICY")
          legacy_pending_sample=$(extract_output_value "LEGACY_PENDING_SAMPLE")
          fetch_blocked_pending_count=$(extract_output_value "FETCH_BLOCKED_PENDING_COUNT" | tr -d '[:space:]')
          fetch_blocked_pending_by_policy=$(extract_output_value "FETCH_BLOCKED_PENDING_BY_POLICY")
          fetch_blocked_pending_sample=$(extract_output_value "FETCH_BLOCKED_PENDING_SAMPLE")
          stale_pending_count=$(extract_output_value "STALE_PENDING_COUNT" | tr -d '[:space:]')
          stale_pending_by_policy=$(extract_output_value "STALE_PENDING_BY_POLICY")
          stale_pending_sample=$(extract_output_value "STALE_PENDING_SAMPLE")
          volatile_pending_count=$(extract_output_value "VOLATILE_PENDING_COUNT" | tr -d '[:space:]')
          volatile_pending_by_policy=$(extract_output_value "VOLATILE_PENDING_BY_POLICY")
          volatile_pending_sample=$(extract_output_value "VOLATILE_PENDING_SAMPLE")
          escalation_count=$(extract_output_value "ESCALATION_COUNT" | tr -d '[:space:]')
          escalation_by_policy=$(extract_output_value "ESCALATION_BY_POLICY")
          escalation_sample=$(extract_output_value "ESCALATION_SAMPLE")
          escalation_detail=$(extract_output_value "ESCALATION_DETAIL")
          coverage_gap_count=$(extract_output_value "COVERAGE_GAP_COUNT" | tr -d '[:space:]')
          coverage_gap_by_policy=$(extract_output_value "COVERAGE_GAP_BY_POLICY")
          coverage_gap_sample=$(extract_output_value "COVERAGE_GAP_SAMPLE")
          fetch_failure_count=$(extract_output_value "FETCH_FAILURE_COUNT" | tr -d '[:space:]')
          fetch_failure_by_policy=$(extract_output_value "FETCH_FAILURE_BY_POLICY")
          fetch_failure_sample=$(extract_output_value "FETCH_FAILURE_SAMPLE")
          fallback_probe_count=$(extract_output_value "FALLBACK_PROBE_COUNT" | tr -d '[:space:]')
          fallback_probe_by_policy=$(extract_output_value "FALLBACK_PROBE_BY_POLICY")
          fallback_probe_sample=$(extract_output_value "FALLBACK_PROBE_SAMPLE")
          fallback_signal_count=$(extract_output_value "FALLBACK_SIGNAL_COUNT" | tr -d '[:space:]')
          fallback_signal_by_policy=$(extract_output_value "FALLBACK_SIGNAL_BY_POLICY")
          fallback_signal_sample=$(extract_output_value "FALLBACK_SIGNAL_SAMPLE")
          fallback_signal_actionable_count=$(extract_output_value "FALLBACK_SIGNAL_ACTIONABLE_COUNT" | tr -d '[:space:]')
          fallback_signal_actionable_by_policy=$(extract_output_value "FALLBACK_SIGNAL_ACTIONABLE_BY_POLICY")
          fallback_signal_actionable_sample=$(extract_output_value "FALLBACK_SIGNAL_ACTIONABLE_SAMPLE")
          fetch_health_status=$(extract_output_value "FETCH_HEALTH_STATUS")
          tier1_total=$(extract_output_value "TIER1_TOTAL" | tr -d '[:space:]')
          tier1_fetched=$(extract_output_value "TIER1_FETCHED" | tr -d '[:space:]')
          tier1_failed=$(extract_output_value "TIER1_FAILED" | tr -d '[:space:]')
          tier1_coverage_pct=$(extract_output_value "TIER1_COVERAGE_PCT")
          tier1_by_policy=$(extract_output_value "TIER1_BY_POLICY")
          tier1_failed_sample=$(extract_output_value "TIER1_FAILED_SAMPLE")
          tier1_missing_configured_count=$(extract_output_value "TIER1_MISSING_CONFIGURED_COUNT" | tr -d '[:space:]')
          tier1_missing_configured_sample=$(extract_output_value "TIER1_MISSING_CONFIGURED_SAMPLE")
          unique_vendor_total=$(extract_output_value "UNIQUE_VENDOR_TOTAL" | tr -d '[:space:]')
          unique_vendor_fetched=$(extract_output_value "UNIQUE_VENDOR_FETCHED" | tr -d '[:space:]')
          unique_vendor_failed=$(extract_output_value "UNIQUE_VENDOR_FAILED" | tr -d '[:space:]')
          unique_vendor_coverage_pct=$(extract_output_value "UNIQUE_VENDOR_COVERAGE_PCT")
          provisional_count=$(extract_output_value "PROVISIONAL_COUNT" | tr -d '[:space:]')
          provisional_by_policy=$(extract_output_value "PROVISIONAL_BY_POLICY")
          provisional_sample=$(extract_output_value "PROVISIONAL_SAMPLE")
          blocked_retry_queue_count=$(extract_output_value "BLOCKED_RETRY_QUEUE_COUNT" | tr -d '[:space:]')
          blocked_retry_queue_by_policy=$(extract_output_value "BLOCKED_RETRY_QUEUE_BY_POLICY")
          blocked_retry_queue_sample=$(extract_output_value "BLOCKED_RETRY_QUEUE_SAMPLE")
          flaky_source_count=$(extract_output_value "FLAKY_SOURCE_COUNT" | tr -d '[:space:]')
          flaky_source_by_policy=$(extract_output_value "FLAKY_SOURCE_BY_POLICY")
          flaky_source_sample=$(extract_output_value "FLAKY_SOURCE_SAMPLE")
          baseline_comparison_mode=$(extract_output_value "BASELINE_COMPARISON_MODE")
          quality_gate_held_count=$(extract_output_value "QUALITY_GATE_HELD_COUNT" | tr -d '[:space:]')
          quality_gate_held_by_policy=$(extract_output_value "QUALITY_GATE_HELD_BY_POLICY")
          quality_gate_held_sample=$(extract_output_value "QUALITY_GATE_HELD_SAMPLE")
          supabase_configured=$(extract_output_value "SUPABASE_CONFIGURED" | tr -d '[:space:]')
          supabase_sync_enabled=$(extract_output_value "SUPABASE_SYNC_ENABLED" | tr -d '[:space:]')
          supabase_state_sync_enabled=$(extract_output_value "SUPABASE_STATE_SYNC_ENABLED" | tr -d '[:space:]')
          policy_supabase_suppress_git_state=$(extract_output_value "POLICY_SUPABASE_SUPPRESS_GIT_STATE" | tr -d '[:space:]')
          supabase_state_hydrated_count=$(extract_output_value "SUPABASE_STATE_HYDRATED_COUNT" | tr -d '[:space:]')
          supabase_events_upserted_count=$(extract_output_value "SUPABASE_EVENTS_UPSERTED_COUNT" | tr -d '[:space:]')
          supabase_daily_alert_upserted_count=$(extract_output_value "SUPABASE_DAILY_ALERT_UPSERTED_COUNT" | tr -d '[:space:]')
          supabase_state_synced_count=$(extract_output_value "SUPABASE_STATE_SYNCED_COUNT" | tr -d '[:space:]')
          supabase_sync_ok=$(extract_output_value "SUPABASE_SYNC_OK" | tr -d '[:space:]')

          if [ -z "$actual_diff_sample" ]; then actual_diff_sample=$(extract_output_value "MATERIAL_DIFF_SAMPLE"); fi
          if [ -z "$actual_changed_count" ]; then actual_changed_count=$changed_count; fi
          if [ -z "$actual_changed_by_policy" ]; then actual_changed_by_policy="$changed_by_policy"; fi
          if [ -z "$actual_changed_sample" ]; then actual_changed_sample="$changed_sample"; fi
          if [ -z "$changed_count" ]; then changed_count=$actual_changed_count; fi
          if [ -z "$changed_by_policy" ]; then changed_by_policy="$actual_changed_by_policy"; fi
          if [ -z "$changed_sample" ]; then changed_sample="$actual_changed_sample"; fi
          if [ -z "$actual_changed_count" ]; then actual_changed_count=0; fi
          if [ -z "$changed_count" ]; then changed_count=0; fi
          if [ -z "$pending_count" ]; then pending_count=0; fi
          if [ -z "$legacy_pending_count" ]; then legacy_pending_count=0; fi
          if [ -z "$fetch_blocked_pending_count" ]; then fetch_blocked_pending_count=0; fi
          if [ -z "$stale_pending_count" ]; then stale_pending_count=0; fi
          if [ -z "$volatile_pending_count" ]; then volatile_pending_count=0; fi
          if [ -z "$escalation_count" ]; then escalation_count=0; fi
          if [ -z "$coverage_gap_count" ]; then coverage_gap_count=0; fi
          if [ -z "$fetch_failure_count" ]; then fetch_failure_count=0; fi
          if [ -z "$fallback_probe_count" ]; then fallback_probe_count=0; fi
          if [ -z "$fallback_signal_count" ]; then fallback_signal_count=0; fi
          if [ -z "$fallback_signal_actionable_count" ]; then fallback_signal_actionable_count=0; fi
          if [ -z "$fetch_health_status" ]; then fetch_health_status=healthy; fi
          if [ -z "$tier1_total" ]; then tier1_total=0; fi
          if [ -z "$tier1_fetched" ]; then tier1_fetched=0; fi
          if [ -z "$tier1_failed" ]; then tier1_failed=0; fi
          if [ -z "$tier1_coverage_pct" ]; then tier1_coverage_pct=0.00; fi
          if [ -z "$tier1_missing_configured_count" ]; then tier1_missing_configured_count=0; fi
          if [ -z "$unique_vendor_total" ]; then unique_vendor_total=0; fi
          if [ -z "$unique_vendor_fetched" ]; then unique_vendor_fetched=0; fi
          if [ -z "$unique_vendor_failed" ]; then unique_vendor_failed=0; fi
          if [ -z "$unique_vendor_coverage_pct" ]; then unique_vendor_coverage_pct=0.00; fi
          if [ -z "$provisional_count" ]; then provisional_count=0; fi
          if [ -z "$blocked_retry_queue_count" ]; then blocked_retry_queue_count=0; fi
          if [ -z "$flaky_source_count" ]; then flaky_source_count=0; fi
          if [ -z "$baseline_comparison_mode" ]; then baseline_comparison_mode=unknown; fi
          if [ -z "$quality_gate_held_count" ]; then quality_gate_held_count=0; fi
          if [ -z "$supabase_configured" ]; then supabase_configured=0; fi
          if [ -z "$supabase_sync_enabled" ]; then supabase_sync_enabled=0; fi
          if [ -z "$supabase_state_sync_enabled" ]; then supabase_state_sync_enabled=0; fi
          if [ -z "$policy_supabase_suppress_git_state" ]; then policy_supabase_suppress_git_state=1; fi
          if [ -z "$supabase_state_hydrated_count" ]; then supabase_state_hydrated_count=0; fi
          if [ -z "$supabase_events_upserted_count" ]; then supabase_events_upserted_count=0; fi
          if [ -z "$supabase_daily_alert_upserted_count" ]; then supabase_daily_alert_upserted_count=0; fi
          if [ -z "$supabase_state_synced_count" ]; then supabase_state_synced_count=0; fi
          if [ -z "$supabase_sync_ok" ]; then supabase_sync_ok=0; fi

          sum_policy_counts() {
            local value="$1"
            if [ -z "$value" ]; then
              echo 0
              return
            fi
            echo "$value" | tr ',' '\n' | awk -F':' '
              NF == 2 {
                gsub(/[[:space:]]/, "", $2);
                if ($2 ~ /^[0-9]+$/) total += $2;
              }
              END { print total + 0 }
            '
          }

          actual_by_policy_total=$(sum_policy_counts "$actual_changed_by_policy")
          changed_by_policy_total=$(sum_policy_counts "$changed_by_policy")
          contract_valid=1
          if [ "$actual_by_policy_total" -ne "$actual_changed_count" ]; then
            echo "::warning::Contract mismatch: ACTUAL_CHANGED_COUNT=$actual_changed_count but ACTUAL_CHANGED_BY_POLICY sums to $actual_by_policy_total."
            contract_valid=0
          fi
          if [ "$changed_by_policy_total" -ne "$changed_count" ]; then
            echo "::warning::Contract mismatch: CHANGED_COUNT=$changed_count but CHANGED_BY_POLICY sums to $changed_by_policy_total."
            contract_valid=0
          fi
          if [ "$actual_changed_count" -ne "$changed_count" ]; then
            echo "::warning::Contract mismatch: ACTUAL_CHANGED_COUNT=$actual_changed_count but CHANGED_COUNT=$changed_count."
            contract_valid=0
          fi
          if [ "$contract_valid" -ne 1 ]; then
            echo "::warning::Policy alert contract invalid; suppressing issue publication for this run."
          fi

          echo "actual_changed_count=$actual_changed_count" >> "$GITHUB_OUTPUT"
          echo "actual_changed_by_policy=$actual_changed_by_policy" >> "$GITHUB_OUTPUT"
          echo "actual_changed_sample=$actual_changed_sample" >> "$GITHUB_OUTPUT"
          echo "actual_diff_sample=$actual_diff_sample" >> "$GITHUB_OUTPUT"
          echo "changed_count=$changed_count" >> "$GITHUB_OUTPUT"
          echo "changed_by_policy=$changed_by_policy" >> "$GITHUB_OUTPUT"
          echo "changed_sample=$changed_sample" >> "$GITHUB_OUTPUT"
          echo "pending_count=$pending_count" >> "$GITHUB_OUTPUT"
          echo "pending_by_policy=$pending_by_policy" >> "$GITHUB_OUTPUT"
          echo "pending_sample=$pending_sample" >> "$GITHUB_OUTPUT"
          echo "pending_detail=$pending_detail" >> "$GITHUB_OUTPUT"
          echo "legacy_pending_count=$legacy_pending_count" >> "$GITHUB_OUTPUT"
          echo "legacy_pending_by_policy=$legacy_pending_by_policy" >> "$GITHUB_OUTPUT"
          echo "legacy_pending_sample=$legacy_pending_sample" >> "$GITHUB_OUTPUT"
          echo "fetch_blocked_pending_count=$fetch_blocked_pending_count" >> "$GITHUB_OUTPUT"
          echo "fetch_blocked_pending_by_policy=$fetch_blocked_pending_by_policy" >> "$GITHUB_OUTPUT"
          echo "fetch_blocked_pending_sample=$fetch_blocked_pending_sample" >> "$GITHUB_OUTPUT"
          echo "stale_pending_count=$stale_pending_count" >> "$GITHUB_OUTPUT"
          echo "stale_pending_by_policy=$stale_pending_by_policy" >> "$GITHUB_OUTPUT"
          echo "stale_pending_sample=$stale_pending_sample" >> "$GITHUB_OUTPUT"
          echo "volatile_pending_count=$volatile_pending_count" >> "$GITHUB_OUTPUT"
          echo "volatile_pending_by_policy=$volatile_pending_by_policy" >> "$GITHUB_OUTPUT"
          echo "volatile_pending_sample=$volatile_pending_sample" >> "$GITHUB_OUTPUT"
          echo "escalation_count=$escalation_count" >> "$GITHUB_OUTPUT"
          echo "escalation_by_policy=$escalation_by_policy" >> "$GITHUB_OUTPUT"
          echo "escalation_sample=$escalation_sample" >> "$GITHUB_OUTPUT"
          echo "escalation_detail=$escalation_detail" >> "$GITHUB_OUTPUT"
          echo "coverage_gap_count=$coverage_gap_count" >> "$GITHUB_OUTPUT"
          echo "coverage_gap_by_policy=$coverage_gap_by_policy" >> "$GITHUB_OUTPUT"
          echo "coverage_gap_sample=$coverage_gap_sample" >> "$GITHUB_OUTPUT"
          echo "fetch_failure_count=$fetch_failure_count" >> "$GITHUB_OUTPUT"
          echo "fetch_failure_by_policy=$fetch_failure_by_policy" >> "$GITHUB_OUTPUT"
          echo "fetch_failure_sample=$fetch_failure_sample" >> "$GITHUB_OUTPUT"
          echo "fallback_probe_count=$fallback_probe_count" >> "$GITHUB_OUTPUT"
          echo "fallback_probe_by_policy=$fallback_probe_by_policy" >> "$GITHUB_OUTPUT"
          echo "fallback_probe_sample=$fallback_probe_sample" >> "$GITHUB_OUTPUT"
          echo "fallback_signal_count=$fallback_signal_count" >> "$GITHUB_OUTPUT"
          echo "fallback_signal_by_policy=$fallback_signal_by_policy" >> "$GITHUB_OUTPUT"
          echo "fallback_signal_sample=$fallback_signal_sample" >> "$GITHUB_OUTPUT"
          echo "fallback_signal_actionable_count=$fallback_signal_actionable_count" >> "$GITHUB_OUTPUT"
          echo "fallback_signal_actionable_by_policy=$fallback_signal_actionable_by_policy" >> "$GITHUB_OUTPUT"
          echo "fallback_signal_actionable_sample=$fallback_signal_actionable_sample" >> "$GITHUB_OUTPUT"
          echo "fetch_health_status=$fetch_health_status" >> "$GITHUB_OUTPUT"
          echo "tier1_total=$tier1_total" >> "$GITHUB_OUTPUT"
          echo "tier1_fetched=$tier1_fetched" >> "$GITHUB_OUTPUT"
          echo "tier1_failed=$tier1_failed" >> "$GITHUB_OUTPUT"
          echo "tier1_coverage_pct=$tier1_coverage_pct" >> "$GITHUB_OUTPUT"
          echo "tier1_by_policy=$tier1_by_policy" >> "$GITHUB_OUTPUT"
          echo "tier1_failed_sample=$tier1_failed_sample" >> "$GITHUB_OUTPUT"
          echo "tier1_missing_configured_count=$tier1_missing_configured_count" >> "$GITHUB_OUTPUT"
          echo "tier1_missing_configured_sample=$tier1_missing_configured_sample" >> "$GITHUB_OUTPUT"
          echo "unique_vendor_total=$unique_vendor_total" >> "$GITHUB_OUTPUT"
          echo "unique_vendor_fetched=$unique_vendor_fetched" >> "$GITHUB_OUTPUT"
          echo "unique_vendor_failed=$unique_vendor_failed" >> "$GITHUB_OUTPUT"
          echo "unique_vendor_coverage_pct=$unique_vendor_coverage_pct" >> "$GITHUB_OUTPUT"
          echo "provisional_count=$provisional_count" >> "$GITHUB_OUTPUT"
          echo "provisional_by_policy=$provisional_by_policy" >> "$GITHUB_OUTPUT"
          echo "provisional_sample=$provisional_sample" >> "$GITHUB_OUTPUT"
          echo "blocked_retry_queue_count=$blocked_retry_queue_count" >> "$GITHUB_OUTPUT"
          echo "blocked_retry_queue_by_policy=$blocked_retry_queue_by_policy" >> "$GITHUB_OUTPUT"
          echo "blocked_retry_queue_sample=$blocked_retry_queue_sample" >> "$GITHUB_OUTPUT"
          echo "flaky_source_count=$flaky_source_count" >> "$GITHUB_OUTPUT"
          echo "flaky_source_by_policy=$flaky_source_by_policy" >> "$GITHUB_OUTPUT"
          echo "flaky_source_sample=$flaky_source_sample" >> "$GITHUB_OUTPUT"
          echo "baseline_comparison_mode=$baseline_comparison_mode" >> "$GITHUB_OUTPUT"
          echo "quality_gate_held_count=$quality_gate_held_count" >> "$GITHUB_OUTPUT"
          echo "quality_gate_held_by_policy=$quality_gate_held_by_policy" >> "$GITHUB_OUTPUT"
          echo "quality_gate_held_sample=$quality_gate_held_sample" >> "$GITHUB_OUTPUT"
          echo "supabase_configured=$supabase_configured" >> "$GITHUB_OUTPUT"
          echo "supabase_sync_enabled=$supabase_sync_enabled" >> "$GITHUB_OUTPUT"
          echo "supabase_state_sync_enabled=$supabase_state_sync_enabled" >> "$GITHUB_OUTPUT"
          echo "policy_supabase_suppress_git_state=$policy_supabase_suppress_git_state" >> "$GITHUB_OUTPUT"
          echo "supabase_state_hydrated_count=$supabase_state_hydrated_count" >> "$GITHUB_OUTPUT"
          echo "supabase_events_upserted_count=$supabase_events_upserted_count" >> "$GITHUB_OUTPUT"
          echo "supabase_daily_alert_upserted_count=$supabase_daily_alert_upserted_count" >> "$GITHUB_OUTPUT"
          echo "supabase_state_synced_count=$supabase_state_synced_count" >> "$GITHUB_OUTPUT"
          echo "supabase_sync_ok=$supabase_sync_ok" >> "$GITHUB_OUTPUT"
          echo "contract_valid=$contract_valid" >> "$GITHUB_OUTPUT"

      - name: Summarize policy health
        env:
          POLICY_CHECK_PUBLIC_ISSUES_ENABLED: ${{ env.POLICY_CHECK_PUBLIC_ISSUES_ENABLED }}
          ACTUAL_CHANGED_COUNT: ${{ steps.check.outputs.actual_changed_count }}
          PENDING_COUNT: ${{ steps.check.outputs.pending_count }}
          LEGACY_PENDING_COUNT: ${{ steps.check.outputs.legacy_pending_count }}
          LEGACY_PENDING_BY_POLICY: ${{ steps.check.outputs.legacy_pending_by_policy }}
          FETCH_BLOCKED_PENDING_COUNT: ${{ steps.check.outputs.fetch_blocked_pending_count }}
          FETCH_BLOCKED_PENDING_BY_POLICY: ${{ steps.check.outputs.fetch_blocked_pending_by_policy }}
          STALE_PENDING_COUNT: ${{ steps.check.outputs.stale_pending_count }}
          VOLATILE_PENDING_COUNT: ${{ steps.check.outputs.volatile_pending_count }}
          ESCALATION_COUNT: ${{ steps.check.outputs.escalation_count }}
          FETCH_FAILURE_COUNT: ${{ steps.check.outputs.fetch_failure_count }}
          FETCH_FAILURE_BY_POLICY: ${{ steps.check.outputs.fetch_failure_by_policy }}
          FALLBACK_PROBE_COUNT: ${{ steps.check.outputs.fallback_probe_count }}
          FALLBACK_PROBE_BY_POLICY: ${{ steps.check.outputs.fallback_probe_by_policy }}
          FALLBACK_SIGNAL_COUNT: ${{ steps.check.outputs.fallback_signal_count }}
          FALLBACK_SIGNAL_BY_POLICY: ${{ steps.check.outputs.fallback_signal_by_policy }}
          FALLBACK_SIGNAL_ACTIONABLE_COUNT: ${{ steps.check.outputs.fallback_signal_actionable_count }}
          FALLBACK_SIGNAL_ACTIONABLE_BY_POLICY: ${{ steps.check.outputs.fallback_signal_actionable_by_policy }}
          FETCH_HEALTH_STATUS: ${{ steps.check.outputs.fetch_health_status }}
          TIER1_TOTAL: ${{ steps.check.outputs.tier1_total }}
          TIER1_FETCHED: ${{ steps.check.outputs.tier1_fetched }}
          TIER1_COVERAGE_PCT: ${{ steps.check.outputs.tier1_coverage_pct }}
          UNIQUE_VENDOR_TOTAL: ${{ steps.check.outputs.unique_vendor_total }}
          UNIQUE_VENDOR_FETCHED: ${{ steps.check.outputs.unique_vendor_fetched }}
          UNIQUE_VENDOR_COVERAGE_PCT: ${{ steps.check.outputs.unique_vendor_coverage_pct }}
          PROVISIONAL_COUNT: ${{ steps.check.outputs.provisional_count }}
          PROVISIONAL_BY_POLICY: ${{ steps.check.outputs.provisional_by_policy }}
          BLOCKED_RETRY_QUEUE_COUNT: ${{ steps.check.outputs.blocked_retry_queue_count }}
          BLOCKED_RETRY_QUEUE_BY_POLICY: ${{ steps.check.outputs.blocked_retry_queue_by_policy }}
          FLAKY_SOURCE_COUNT: ${{ steps.check.outputs.flaky_source_count }}
          FLAKY_SOURCE_BY_POLICY: ${{ steps.check.outputs.flaky_source_by_policy }}
          BASELINE_COMPARISON_MODE: ${{ steps.check.outputs.baseline_comparison_mode }}
          QUALITY_GATE_HELD_COUNT: ${{ steps.check.outputs.quality_gate_held_count }}
          QUALITY_GATE_HELD_BY_POLICY: ${{ steps.check.outputs.quality_gate_held_by_policy }}
          SUPABASE_CONFIGURED: ${{ steps.check.outputs.supabase_configured }}
          SUPABASE_SYNC_ENABLED: ${{ steps.check.outputs.supabase_sync_enabled }}
          SUPABASE_STATE_SYNC_ENABLED: ${{ steps.check.outputs.supabase_state_sync_enabled }}
          SUPABASE_SYNC_OK: ${{ steps.check.outputs.supabase_sync_ok }}
          SUPABASE_EVENTS_UPSERTED_COUNT: ${{ steps.check.outputs.supabase_events_upserted_count }}
          SUPABASE_DAILY_ALERT_UPSERTED_COUNT: ${{ steps.check.outputs.supabase_daily_alert_upserted_count }}
          SUPABASE_STATE_SYNCED_COUNT: ${{ steps.check.outputs.supabase_state_synced_count }}
        run: |
          changed="${ACTUAL_CHANGED_COUNT:-0}"
          pending="${PENDING_COUNT:-0}"
          legacy_pending="${LEGACY_PENDING_COUNT:-0}"
          fetch_blocked="${FETCH_BLOCKED_PENDING_COUNT:-0}"
          stale="${STALE_PENDING_COUNT:-0}"
          volatile="${VOLATILE_PENDING_COUNT:-0}"
          escalations="${ESCALATION_COUNT:-0}"
          fetch_failures="${FETCH_FAILURE_COUNT:-0}"
          fallback_probe="${FALLBACK_PROBE_COUNT:-0}"
          fallback_signal="${FALLBACK_SIGNAL_COUNT:-0}"
          fallback_signal_actionable="${FALLBACK_SIGNAL_ACTIONABLE_COUNT:-0}"
          fetch_health="${FETCH_HEALTH_STATUS:-healthy}"
          tier1_total="${TIER1_TOTAL:-0}"
          tier1_fetched="${TIER1_FETCHED:-0}"
          tier1_pct="${TIER1_COVERAGE_PCT:-0.00}"
          unique_total="${UNIQUE_VENDOR_TOTAL:-0}"
          unique_fetched="${UNIQUE_VENDOR_FETCHED:-0}"
          unique_pct="${UNIQUE_VENDOR_COVERAGE_PCT:-0.00}"
          provisional="${PROVISIONAL_COUNT:-0}"
          blocked_retry_queue="${BLOCKED_RETRY_QUEUE_COUNT:-0}"
          flaky_sources="${FLAKY_SOURCE_COUNT:-0}"
          baseline_mode="${BASELINE_COMPARISON_MODE:-unknown}"
          quality_gate_held="${QUALITY_GATE_HELD_COUNT:-0}"
          supabase_configured="${SUPABASE_CONFIGURED:-0}"
          supabase_sync_enabled="${SUPABASE_SYNC_ENABLED:-0}"
          supabase_state_sync_enabled="${SUPABASE_STATE_SYNC_ENABLED:-0}"
          supabase_sync_ok="${SUPABASE_SYNC_OK:-0}"
          supabase_events_upserted="${SUPABASE_EVENTS_UPSERTED_COUNT:-0}"
          supabase_daily_alert_upserted="${SUPABASE_DAILY_ALERT_UPSERTED_COUNT:-0}"
          supabase_state_synced="${SUPABASE_STATE_SYNCED_COUNT:-0}"
          issue_mode="${POLICY_CHECK_PUBLIC_ISSUES_ENABLED:-0}"

          if [ "$fetch_health" != "healthy" ] || [ "$fetch_blocked" -gt 0 ]; then
            echo "::warning::Policy fetch health=${fetch_health}; failures=${fetch_failures}; fetch_blocked_pending=${fetch_blocked}."
          fi
          if [ "$escalations" -gt 0 ]; then
            echo "::warning::Policy escalation backlog=${escalations}; stale=${stale}; volatile=${volatile}; quality_gate_held=${quality_gate_held}."
          fi

          {
            echo "## Policy health"
            echo
            echo "- Confirmed changes: ${changed}"
            echo "- Active pending candidates: ${pending}"
            echo "- Legacy pending carried: ${legacy_pending}"
            echo "- Fetch-blocked pending: ${fetch_blocked}"
            echo "- Fetch failures: ${fetch_failures} (${fetch_health})"
            echo "- Fallback probes (HEAD metadata): ${fallback_probe}"
            echo "- Fallback metadata signals changed: ${fallback_signal}"
            echo "- Fallback metadata signals actionable: ${fallback_signal_actionable}"
            echo "- Quality-gate held: ${quality_gate_held}"
            echo "- Escalations: ${escalations}"
            echo "- Tier-1 coverage (gate set): ${tier1_fetched}/${tier1_total} (${tier1_pct}%)"
            echo "- All-vendor coverage: ${unique_fetched}/${unique_total} (${unique_pct}%)"
            echo "- Provisional vendors: ${provisional}"
            echo "- Blocked retry queue: ${blocked_retry_queue}"
            echo "- Flaky-source vendors tracked: ${flaky_sources}"
            echo "- Baseline comparison mode: ${baseline_mode}"
            echo "- Supabase configured: ${supabase_configured}"
            echo "- Supabase sync enabled: ${supabase_sync_enabled}"
            echo "- Supabase state sync enabled: ${supabase_state_sync_enabled}"
            echo "- Supabase sync healthy: ${supabase_sync_ok}"
            echo "- Supabase events upserted: ${supabase_events_upserted}"
            echo "- Supabase daily alerts upserted: ${supabase_daily_alert_upserted}"
            echo "- Supabase state artifacts synced: ${supabase_state_synced}"
            echo "- Public issue automation: ${issue_mode}"
            if [ -n "${FETCH_FAILURE_BY_POLICY:-}" ]; then
              echo "- Fetch failures by policy: ${FETCH_FAILURE_BY_POLICY}"
            fi
            if [ -n "${FALLBACK_PROBE_BY_POLICY:-}" ]; then
              echo "- Fallback probes by policy: ${FALLBACK_PROBE_BY_POLICY}"
            fi
            if [ -n "${FALLBACK_SIGNAL_BY_POLICY:-}" ]; then
              echo "- Fallback metadata signals by policy: ${FALLBACK_SIGNAL_BY_POLICY}"
            fi
            if [ -n "${FALLBACK_SIGNAL_ACTIONABLE_BY_POLICY:-}" ]; then
              echo "- Fallback metadata actionable signals by policy: ${FALLBACK_SIGNAL_ACTIONABLE_BY_POLICY}"
            fi
            if [ -n "${LEGACY_PENDING_BY_POLICY:-}" ]; then
              echo "- Legacy pending by policy: ${LEGACY_PENDING_BY_POLICY}"
            fi
            if [ -n "${FETCH_BLOCKED_PENDING_BY_POLICY:-}" ]; then
              echo "- Fetch-blocked pending by policy: ${FETCH_BLOCKED_PENDING_BY_POLICY}"
            fi
            if [ -n "${PROVISIONAL_BY_POLICY:-}" ]; then
              echo "- Provisional by policy: ${PROVISIONAL_BY_POLICY}"
            fi
            if [ -n "${BLOCKED_RETRY_QUEUE_BY_POLICY:-}" ]; then
              echo "- Blocked retry queue by policy: ${BLOCKED_RETRY_QUEUE_BY_POLICY}"
            fi
            if [ -n "${FLAKY_SOURCE_BY_POLICY:-}" ]; then
              echo "- Flaky-source tracked by policy: ${FLAKY_SOURCE_BY_POLICY}"
            fi
            if [ -n "${QUALITY_GATE_HELD_BY_POLICY:-}" ]; then
              echo "- Quality-gate held by policy: ${QUALITY_GATE_HELD_BY_POLICY}"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Commit policy artifacts to aggregation branch
        id: commit_artifacts
        env:
          SUPABASE_SYNC_OK: ${{ steps.check.outputs.supabase_sync_ok }}
          SUPABASE_SYNC_ENABLED: ${{ steps.check.outputs.supabase_sync_enabled }}
          SUPABASE_STATE_SYNC_ENABLED: ${{ steps.check.outputs.supabase_state_sync_enabled }}
          POLICY_SUPABASE_SUPPRESS_GIT_STATE: ${{ steps.check.outputs.policy_supabase_suppress_git_state }}
        run: |
          set +e
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          publish_files=(
            rules/policy-hashes.json
            rules/cancel-policy-hashes.json
            rules/return-policy-hashes.json
            rules/trial-policy-hashes.json
            rules/policy-sources.json
            rules/cancel-policy-sources.json
            rules/return-policy-sources.json
            rules/trial-policy-sources.json
            rules/policy-alert-feed.json
            rules/policy-alert-review-feed.json
            rules/policy-status-report.json
            rules/policy-status-report.md
            rules/policy-weekly-triage.json
            rules/policy-weekly-triage.md
          )
          source_files=(
            rules/policy-sources.json
            rules/cancel-policy-sources.json
            rules/return-policy-sources.json
            rules/trial-policy-sources.json
          )
          persistent_state_files=(
            rules/policy-change-candidates.json
            rules/cancel-policy-change-candidates.json
            rules/return-policy-change-candidates.json
            rules/trial-policy-change-candidates.json
            rules/policy-coverage-state.json
            rules/cancel-policy-coverage-state.json
            rules/return-policy-coverage-state.json
            rules/trial-policy-coverage-state.json
            rules/policy-semantic-state.json
            rules/cancel-policy-semantic-state.json
            rules/return-policy-semantic-state.json
            rules/trial-policy-semantic-state.json
            rules/policy-events.ndjson
            rules/policy-status-report.json
            rules/policy-status-report.md
            rules/policy-weekly-triage.json
            rules/policy-weekly-triage.md
          )
          report_files=(
            rules/policy-status-report.json
            rules/policy-status-report.md
            rules/policy-weekly-triage.json
            rules/policy-weekly-triage.md
          )

          suppress_state_churn=0
          if [ "${SUPABASE_SYNC_OK:-0}" = "1" ] && [ "${SUPABASE_SYNC_ENABLED:-0}" = "1" ] && [ "${SUPABASE_STATE_SYNC_ENABLED:-0}" = "1" ] && [ "${POLICY_SUPABASE_SUPPRESS_GIT_STATE:-1}" = "1" ]; then
            suppress_state_churn=1
            echo "Supabase sync healthy; suppressing high-churn state artifact commits."
          fi

          should_skip_file() {
            local target="$1"
            if [ "$suppress_state_churn" -ne 1 ]; then
              return 1
            fi
            for f in "${persistent_state_files[@]}" "${report_files[@]}"; do
              if [ "$target" = "$f" ]; then
                return 0
              fi
            done
            return 1
          }

          existing=()
          for f in "${publish_files[@]}" "${persistent_state_files[@]}"; do
            if should_skip_file "$f"; then
              continue
            fi
            if [ -f "$f" ]; then
              existing+=("$f")
            fi
          done

          if [ "${#existing[@]}" -eq 0 ]; then
            echo "No policy artifacts generated; skipping commit."
            echo "artifact_updated=0" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          artifact_branch="policy-updates/aggregate"
          base_branch="${GITHUB_BASE_REF:-main}"
          tmp_dir=$(mktemp -d)
          cleanup() {
            rm -rf "$tmp_dir"
          }
          trap cleanup EXIT

          for f in "${existing[@]}"; do
            mkdir -p "${tmp_dir}/$(dirname "$f")"
            cp "$f" "${tmp_dir}/$f"
          done

          git fetch origin "${base_branch}"
          git fetch origin "${artifact_branch}" || true

          if git show-ref --verify --quiet "refs/remotes/origin/${artifact_branch}"; then
            git checkout -f -B "${artifact_branch}" "origin/${artifact_branch}"
          else
            git checkout -f -B "${artifact_branch}" "origin/${base_branch}"
          fi

          for f in "${existing[@]}"; do
            mkdir -p "$(dirname "$f")"
            cp "${tmp_dir}/$f" "$f"
          done

          # Drop timestamp-only source-file churn from the aggregate PR.
          for f in "${source_files[@]}"; do
            if [ ! -f "$f" ]; then
              continue
            fi
            if ! git cat-file -e "origin/${base_branch}:${f}" 2>/dev/null; then
              continue
            fi
            if node -e 'const { execSync } = require("node:child_process"); const { readFileSync } = require("node:fs"); const [filePath, baseRef] = process.argv.slice(1); function normalize(value) { if (Array.isArray(value)) return value.map(normalize); if (!value || typeof value !== "object") return value; const out = {}; for (const key of Object.keys(value).sort((a, b) => a.localeCompare(b))) { if (key === "last_verified_utc") continue; out[key] = normalize(value[key]); } return out; } const currentRaw = readFileSync(filePath, "utf8"); const baseRaw = execSync(`git show ${baseRef}:${filePath}`, { encoding: "utf8" }); const current = normalize(JSON.parse(currentRaw)); const base = normalize(JSON.parse(baseRaw)); process.exit(JSON.stringify(current) === JSON.stringify(base) ? 0 : 1);' "$f" "origin/${base_branch}"
            then
              git checkout "origin/${base_branch}" -- "$f"
              echo "Reverted timestamp-only source drift: $f"
            fi
          done

          git add -A rules

          if git diff --cached --quiet; then
            echo "No policy artifact changes to commit."
            echo "artifact_updated=0" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git commit -m "chore(policy): refresh policy artifacts [skip ci]"
          push_status=1
          for attempt in 1 2 3; do
            if git push origin "${artifact_branch}"; then
              push_status=0
              break
            fi
            if [ "$attempt" -lt 3 ]; then
              echo "::warning::Push attempt ${attempt} to ${artifact_branch} failed; retrying."
              git fetch origin "${artifact_branch}" || true
              git rebase "origin/${artifact_branch}" || git rebase --abort || true
              sleep "${attempt}"
            fi
          done
          if [ "$push_status" -ne 0 ]; then
            echo "::warning::Push to ${artifact_branch} failed; skipping PR update."
            echo "artifact_updated=0" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "artifact_updated=1" >> "$GITHUB_OUTPUT"
          echo "artifact_branch=${artifact_branch}" >> "$GITHUB_OUTPUT"
          echo "artifact_base=${base_branch}" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Open or update aggregation PR
        if: steps.commit_artifacts.outputs.artifact_updated == '1'
        continue-on-error: true
        uses: actions/github-script@v7
        env:
          ARTIFACT_BRANCH: ${{ steps.commit_artifacts.outputs.artifact_branch }}
          ARTIFACT_BASE: ${{ steps.commit_artifacts.outputs.artifact_base }}
          ACTUAL_CHANGED_COUNT: ${{ steps.check.outputs.actual_changed_count }}
          PENDING_COUNT: ${{ steps.check.outputs.pending_count }}
          ESCALATION_COUNT: ${{ steps.check.outputs.escalation_count }}
          FETCH_FAILURE_COUNT: ${{ steps.check.outputs.fetch_failure_count }}
          FETCH_FAILURE_BY_POLICY: ${{ steps.check.outputs.fetch_failure_by_policy }}
          UNIQUE_VENDOR_TOTAL: ${{ steps.check.outputs.unique_vendor_total }}
          UNIQUE_VENDOR_FETCHED: ${{ steps.check.outputs.unique_vendor_fetched }}
          UNIQUE_VENDOR_COVERAGE_PCT: ${{ steps.check.outputs.unique_vendor_coverage_pct }}
          PROVISIONAL_COUNT: ${{ steps.check.outputs.provisional_count }}
          BLOCKED_RETRY_QUEUE_COUNT: ${{ steps.check.outputs.blocked_retry_queue_count }}
          BASELINE_COMPARISON_MODE: ${{ steps.check.outputs.baseline_comparison_mode }}
          FALLBACK_SIGNAL_COUNT: ${{ steps.check.outputs.fallback_signal_count }}
          FALLBACK_SIGNAL_BY_POLICY: ${{ steps.check.outputs.fallback_signal_by_policy }}
          FALLBACK_SIGNAL_ACTIONABLE_COUNT: ${{ steps.check.outputs.fallback_signal_actionable_count }}
          FALLBACK_SIGNAL_ACTIONABLE_BY_POLICY: ${{ steps.check.outputs.fallback_signal_actionable_by_policy }}
          FETCH_HEALTH_STATUS: ${{ steps.check.outputs.fetch_health_status }}
        with:
          github-token: ${{ secrets.POLICY_BOT_TOKEN || github.token }}
          retries: 2
          script: |
            try {
              const owner = context.repo.owner;
              const repo = context.repo.repo;
              const head = `${owner}:${process.env.ARTIFACT_BRANCH}`;
              const base = process.env.ARTIFACT_BASE || 'main';
              const title = 'chore(policy): aggregate policy artifact refresh';
              const body = [
                '## Summary',
                '- Aggregate policy hash/source/coverage updates into a PR branch (no direct commit to main).',
                '',
                '## Why',
                '- Reduce commit noise on `main` while preserving scheduled policy refresh behavior.',
                '',
                '## Scope',
                `- Changed count: ${process.env.ACTUAL_CHANGED_COUNT || '0'}`,
                `- Pending count: ${process.env.PENDING_COUNT || '0'}`,
                `- Escalation count: ${process.env.ESCALATION_COUNT || '0'}`,
                `- Fetch failures: ${process.env.FETCH_FAILURE_COUNT || '0'} (${process.env.FETCH_HEALTH_STATUS || 'unknown'})`,
                process.env.FETCH_FAILURE_BY_POLICY ? `- Fetch failures by policy: ${process.env.FETCH_FAILURE_BY_POLICY}` : '',
                `- All-vendor coverage: ${process.env.UNIQUE_VENDOR_FETCHED || '0'}/${process.env.UNIQUE_VENDOR_TOTAL || '0'} (${process.env.UNIQUE_VENDOR_COVERAGE_PCT || '0.00'}%)`,
                `- Provisional vendors: ${process.env.PROVISIONAL_COUNT || '0'}`,
                `- Blocked retry queue: ${process.env.BLOCKED_RETRY_QUEUE_COUNT || '0'}`,
                `- Baseline comparison mode: ${process.env.BASELINE_COMPARISON_MODE || 'unknown'}`,
                `- Fallback metadata signals changed: ${process.env.FALLBACK_SIGNAL_COUNT || '0'}`,
                process.env.FALLBACK_SIGNAL_BY_POLICY ? `- Fallback metadata signals by policy: ${process.env.FALLBACK_SIGNAL_BY_POLICY}` : '',
                `- Fallback metadata signals actionable: ${process.env.FALLBACK_SIGNAL_ACTIONABLE_COUNT || '0'}`,
                process.env.FALLBACK_SIGNAL_ACTIONABLE_BY_POLICY ? `- Fallback metadata actionable by policy: ${process.env.FALLBACK_SIGNAL_ACTIONABLE_BY_POLICY}` : '',
                '',
                '## Test Evidence',
                '- Generated by scheduled `Daily Policy Check` run.',
                '',
                '## Risk',
                '- Low; this only changes delivery mechanism (branch + PR) for generated artifacts.',
                '',
                '## Rollback',
                '- Close this PR and delete the aggregation branch.',
              ].join('\n');

              const existing = await github.rest.pulls.list({
                owner,
                repo,
                state: 'open',
                head,
                base,
                per_page: 1,
              });

              if (existing.data.length > 0) {
                const pr = existing.data[0];
                await github.rest.pulls.update({
                  owner,
                  repo,
                  pull_number: pr.number,
                  title,
                  body,
                });
                core.info(`Updated existing PR #${pr.number}`);
              } else {
                const pr = await github.rest.pulls.create({
                  owner,
                  repo,
                  title,
                  head: process.env.ARTIFACT_BRANCH,
                  base,
                  body,
                });
                core.info(`Created PR #${pr.data.number}`);
              }
            } catch (error) {
              const status = error?.status || 'unknown';
              const message = error?.message || 'unknown error';
              if (status === 403 || /not permitted to create or approve pull requests/i.test(message)) {
                core.warning(
                  'Aggregation PR update skipped: GITHUB_TOKEN cannot create PRs for this repo/org policy. ' +
                  'Artifact branch was still pushed.'
                );
              } else {
                core.warning(`Aggregation PR update skipped (status: ${status}): ${message}`);
              }
            }

      - name: Open issue if policies changed or candidates pending
        if: env.POLICY_CHECK_PUBLIC_ISSUES_ENABLED == '1' && steps.check.outputs.contract_valid == '1' && ((steps.check.outputs.changed_count && steps.check.outputs.changed_count != '0') || (steps.check.outputs.pending_count && steps.check.outputs.pending_count != '0') || (steps.check.outputs.fallback_signal_actionable_count && steps.check.outputs.fallback_signal_actionable_count != '0'))
        continue-on-error: true
        uses: actions/github-script@v7
        env:
          ACTUAL_CHANGED_COUNT: ${{ steps.check.outputs.actual_changed_count }}
          ACTUAL_CHANGED_BY_POLICY: ${{ steps.check.outputs.actual_changed_by_policy }}
          ACTUAL_CHANGED_SAMPLE: ${{ steps.check.outputs.actual_changed_sample }}
          ACTUAL_DIFF_SAMPLE: ${{ steps.check.outputs.actual_diff_sample }}
          CHANGED_COUNT: ${{ steps.check.outputs.changed_count }}
          CHANGED_BY_POLICY: ${{ steps.check.outputs.changed_by_policy }}
          CHANGED_SAMPLE: ${{ steps.check.outputs.changed_sample }}
          PENDING_COUNT: ${{ steps.check.outputs.pending_count }}
          PENDING_BY_POLICY: ${{ steps.check.outputs.pending_by_policy }}
          PENDING_SAMPLE: ${{ steps.check.outputs.pending_sample }}
          PENDING_DETAIL: ${{ steps.check.outputs.pending_detail }}
          LEGACY_PENDING_COUNT: ${{ steps.check.outputs.legacy_pending_count }}
          LEGACY_PENDING_BY_POLICY: ${{ steps.check.outputs.legacy_pending_by_policy }}
          LEGACY_PENDING_SAMPLE: ${{ steps.check.outputs.legacy_pending_sample }}
          FETCH_BLOCKED_PENDING_COUNT: ${{ steps.check.outputs.fetch_blocked_pending_count }}
          FETCH_BLOCKED_PENDING_BY_POLICY: ${{ steps.check.outputs.fetch_blocked_pending_by_policy }}
          FETCH_BLOCKED_PENDING_SAMPLE: ${{ steps.check.outputs.fetch_blocked_pending_sample }}
          STALE_PENDING_COUNT: ${{ steps.check.outputs.stale_pending_count }}
          STALE_PENDING_BY_POLICY: ${{ steps.check.outputs.stale_pending_by_policy }}
          STALE_PENDING_SAMPLE: ${{ steps.check.outputs.stale_pending_sample }}
          VOLATILE_PENDING_COUNT: ${{ steps.check.outputs.volatile_pending_count }}
          VOLATILE_PENDING_BY_POLICY: ${{ steps.check.outputs.volatile_pending_by_policy }}
          VOLATILE_PENDING_SAMPLE: ${{ steps.check.outputs.volatile_pending_sample }}
          ESCALATION_COUNT: ${{ steps.check.outputs.escalation_count }}
          ESCALATION_BY_POLICY: ${{ steps.check.outputs.escalation_by_policy }}
          ESCALATION_SAMPLE: ${{ steps.check.outputs.escalation_sample }}
          ESCALATION_DETAIL: ${{ steps.check.outputs.escalation_detail }}
          COVERAGE_GAP_COUNT: ${{ steps.check.outputs.coverage_gap_count }}
          COVERAGE_GAP_BY_POLICY: ${{ steps.check.outputs.coverage_gap_by_policy }}
          COVERAGE_GAP_SAMPLE: ${{ steps.check.outputs.coverage_gap_sample }}
          FETCH_FAILURE_COUNT: ${{ steps.check.outputs.fetch_failure_count }}
          FETCH_FAILURE_BY_POLICY: ${{ steps.check.outputs.fetch_failure_by_policy }}
          FETCH_FAILURE_SAMPLE: ${{ steps.check.outputs.fetch_failure_sample }}
          FALLBACK_PROBE_COUNT: ${{ steps.check.outputs.fallback_probe_count }}
          FALLBACK_PROBE_BY_POLICY: ${{ steps.check.outputs.fallback_probe_by_policy }}
          FALLBACK_PROBE_SAMPLE: ${{ steps.check.outputs.fallback_probe_sample }}
          FALLBACK_SIGNAL_COUNT: ${{ steps.check.outputs.fallback_signal_count }}
          FALLBACK_SIGNAL_BY_POLICY: ${{ steps.check.outputs.fallback_signal_by_policy }}
          FALLBACK_SIGNAL_SAMPLE: ${{ steps.check.outputs.fallback_signal_sample }}
          FALLBACK_SIGNAL_ACTIONABLE_COUNT: ${{ steps.check.outputs.fallback_signal_actionable_count }}
          FALLBACK_SIGNAL_ACTIONABLE_BY_POLICY: ${{ steps.check.outputs.fallback_signal_actionable_by_policy }}
          FALLBACK_SIGNAL_ACTIONABLE_SAMPLE: ${{ steps.check.outputs.fallback_signal_actionable_sample }}
          FETCH_HEALTH_STATUS: ${{ steps.check.outputs.fetch_health_status }}
          TIER1_TOTAL: ${{ steps.check.outputs.tier1_total }}
          TIER1_FETCHED: ${{ steps.check.outputs.tier1_fetched }}
          TIER1_FAILED: ${{ steps.check.outputs.tier1_failed }}
          TIER1_COVERAGE_PCT: ${{ steps.check.outputs.tier1_coverage_pct }}
          TIER1_BY_POLICY: ${{ steps.check.outputs.tier1_by_policy }}
          TIER1_FAILED_SAMPLE: ${{ steps.check.outputs.tier1_failed_sample }}
          TIER1_MISSING_CONFIGURED_COUNT: ${{ steps.check.outputs.tier1_missing_configured_count }}
          TIER1_MISSING_CONFIGURED_SAMPLE: ${{ steps.check.outputs.tier1_missing_configured_sample }}
          UNIQUE_VENDOR_TOTAL: ${{ steps.check.outputs.unique_vendor_total }}
          UNIQUE_VENDOR_FETCHED: ${{ steps.check.outputs.unique_vendor_fetched }}
          UNIQUE_VENDOR_FAILED: ${{ steps.check.outputs.unique_vendor_failed }}
          UNIQUE_VENDOR_COVERAGE_PCT: ${{ steps.check.outputs.unique_vendor_coverage_pct }}
          PROVISIONAL_COUNT: ${{ steps.check.outputs.provisional_count }}
          PROVISIONAL_BY_POLICY: ${{ steps.check.outputs.provisional_by_policy }}
          BLOCKED_RETRY_QUEUE_COUNT: ${{ steps.check.outputs.blocked_retry_queue_count }}
          BLOCKED_RETRY_QUEUE_BY_POLICY: ${{ steps.check.outputs.blocked_retry_queue_by_policy }}
          FLAKY_SOURCE_COUNT: ${{ steps.check.outputs.flaky_source_count }}
          FLAKY_SOURCE_BY_POLICY: ${{ steps.check.outputs.flaky_source_by_policy }}
          BASELINE_COMPARISON_MODE: ${{ steps.check.outputs.baseline_comparison_mode }}
          QUALITY_GATE_HELD_COUNT: ${{ steps.check.outputs.quality_gate_held_count }}
          QUALITY_GATE_HELD_BY_POLICY: ${{ steps.check.outputs.quality_gate_held_by_policy }}
          QUALITY_GATE_HELD_SAMPLE: ${{ steps.check.outputs.quality_gate_held_sample }}
        with:
          retries: 3
          script: |
            const actualCount = Number.parseInt(process.env.ACTUAL_CHANGED_COUNT || process.env.CHANGED_COUNT || '0', 10) || 0;
            const actualByPolicy = process.env.ACTUAL_CHANGED_BY_POLICY || process.env.CHANGED_BY_POLICY || '';
            const actualSample = process.env.ACTUAL_CHANGED_SAMPLE || process.env.CHANGED_SAMPLE || '';
            const actualDiffSample = process.env.ACTUAL_DIFF_SAMPLE || '';
            const changedCount = Number.parseInt(process.env.CHANGED_COUNT || String(actualCount), 10) || actualCount;
            const changedByPolicy = process.env.CHANGED_BY_POLICY || actualByPolicy;
            const changedSample = process.env.CHANGED_SAMPLE || actualSample;
            const pendingCount = Number.parseInt(process.env.PENDING_COUNT || '0', 10) || 0;
            const pendingByPolicy = process.env.PENDING_BY_POLICY || '';
            const pendingSample = process.env.PENDING_SAMPLE || '';
            const pendingDetail = process.env.PENDING_DETAIL || '';
            const legacyPendingCount = Number.parseInt(process.env.LEGACY_PENDING_COUNT || '0', 10) || 0;
            const legacyPendingByPolicy = process.env.LEGACY_PENDING_BY_POLICY || '';
            const legacyPendingSample = process.env.LEGACY_PENDING_SAMPLE || '';
            const fetchBlockedPendingCount = Number.parseInt(process.env.FETCH_BLOCKED_PENDING_COUNT || '0', 10) || 0;
            const fetchBlockedPendingByPolicy = process.env.FETCH_BLOCKED_PENDING_BY_POLICY || '';
            const fetchBlockedPendingSample = process.env.FETCH_BLOCKED_PENDING_SAMPLE || '';
            const stalePendingCount = Number.parseInt(process.env.STALE_PENDING_COUNT || '0', 10) || 0;
            const stalePendingByPolicy = process.env.STALE_PENDING_BY_POLICY || '';
            const stalePendingSample = process.env.STALE_PENDING_SAMPLE || '';
            const volatilePendingCount = Number.parseInt(process.env.VOLATILE_PENDING_COUNT || '0', 10) || 0;
            const volatilePendingByPolicy = process.env.VOLATILE_PENDING_BY_POLICY || '';
            const volatilePendingSample = process.env.VOLATILE_PENDING_SAMPLE || '';
            const escalationCount = Number.parseInt(process.env.ESCALATION_COUNT || '0', 10) || 0;
            const escalationByPolicy = process.env.ESCALATION_BY_POLICY || '';
            const escalationSample = process.env.ESCALATION_SAMPLE || '';
            const escalationDetail = process.env.ESCALATION_DETAIL || '';
            const coverageGapCount = Number.parseInt(process.env.COVERAGE_GAP_COUNT || '0', 10) || 0;
            const coverageGapByPolicy = process.env.COVERAGE_GAP_BY_POLICY || '';
            const coverageGapSample = process.env.COVERAGE_GAP_SAMPLE || '';
            const fetchFailureCount = Number.parseInt(process.env.FETCH_FAILURE_COUNT || '0', 10) || 0;
            const fetchFailureByPolicy = process.env.FETCH_FAILURE_BY_POLICY || '';
            const fetchFailureSample = process.env.FETCH_FAILURE_SAMPLE || '';
            const fallbackProbeCount = Number.parseInt(process.env.FALLBACK_PROBE_COUNT || '0', 10) || 0;
            const fallbackProbeByPolicy = process.env.FALLBACK_PROBE_BY_POLICY || '';
            const fallbackProbeSample = process.env.FALLBACK_PROBE_SAMPLE || '';
            const fallbackSignalCount = Number.parseInt(process.env.FALLBACK_SIGNAL_COUNT || '0', 10) || 0;
            const fallbackSignalByPolicy = process.env.FALLBACK_SIGNAL_BY_POLICY || '';
            const fallbackSignalSample = process.env.FALLBACK_SIGNAL_SAMPLE || '';
            const fallbackSignalActionableCount = Number.parseInt(process.env.FALLBACK_SIGNAL_ACTIONABLE_COUNT || '0', 10) || 0;
            const fallbackSignalActionableByPolicy = process.env.FALLBACK_SIGNAL_ACTIONABLE_BY_POLICY || '';
            const fallbackSignalActionableSample = process.env.FALLBACK_SIGNAL_ACTIONABLE_SAMPLE || '';
            const fetchHealthStatus = process.env.FETCH_HEALTH_STATUS || (fetchFailureCount > 0 ? 'degraded' : 'healthy');
            const tier1Total = Number.parseInt(process.env.TIER1_TOTAL || '0', 10) || 0;
            const tier1Fetched = Number.parseInt(process.env.TIER1_FETCHED || '0', 10) || 0;
            const tier1Failed = Number.parseInt(process.env.TIER1_FAILED || '0', 10) || 0;
            const tier1CoveragePct = process.env.TIER1_COVERAGE_PCT || '0.00';
            const tier1ByPolicy = process.env.TIER1_BY_POLICY || '';
            const tier1FailedSample = process.env.TIER1_FAILED_SAMPLE || '';
            const tier1MissingConfiguredCount = Number.parseInt(process.env.TIER1_MISSING_CONFIGURED_COUNT || '0', 10) || 0;
            const tier1MissingConfiguredSample = process.env.TIER1_MISSING_CONFIGURED_SAMPLE || '';
            const uniqueVendorTotal = Number.parseInt(process.env.UNIQUE_VENDOR_TOTAL || '0', 10) || 0;
            const uniqueVendorFetched = Number.parseInt(process.env.UNIQUE_VENDOR_FETCHED || '0', 10) || 0;
            const uniqueVendorFailed = Number.parseInt(process.env.UNIQUE_VENDOR_FAILED || '0', 10) || 0;
            const uniqueVendorCoveragePct = process.env.UNIQUE_VENDOR_COVERAGE_PCT || '0.00';
            const provisionalCount = Number.parseInt(process.env.PROVISIONAL_COUNT || '0', 10) || 0;
            const provisionalByPolicy = process.env.PROVISIONAL_BY_POLICY || '';
            const blockedRetryQueueCount = Number.parseInt(process.env.BLOCKED_RETRY_QUEUE_COUNT || '0', 10) || 0;
            const blockedRetryQueueByPolicy = process.env.BLOCKED_RETRY_QUEUE_BY_POLICY || '';
            const flakySourceCount = Number.parseInt(process.env.FLAKY_SOURCE_COUNT || '0', 10) || 0;
            const flakySourceByPolicy = process.env.FLAKY_SOURCE_BY_POLICY || '';
            const baselineComparisonMode = process.env.BASELINE_COMPARISON_MODE || 'unknown';
            const qualityGateHeldCount = Number.parseInt(process.env.QUALITY_GATE_HELD_COUNT || '0', 10) || 0;
            const qualityGateHeldByPolicy = process.env.QUALITY_GATE_HELD_BY_POLICY || '';
            const qualityGateHeldSample = process.env.QUALITY_GATE_HELD_SAMPLE || '';
            const today = new Date().toISOString().split('T')[0];
            const changedTitlePrefix = `Policy changes (${today}):`;
            const pendingTitlePrefix = `Policy checker pending candidates (${today}):`;
            const legacyMaterialChangedTitlePrefix = `Policy material changes (${today}):`;
            const legacyPageCheckerPendingTitlePrefix = `Policy page checker pending candidates (${today}):`;
            const legacyPagesChangedTitlePrefix = `Policy pages changed (${today}):`;
            const sampleList = changedSample
              .split(',')
              .map((s) => s.trim())
              .filter(Boolean)
              .slice(0, 10)
              .map((item) => `- \`${item}\``)
              .join('\n');
            const changedByPolicyList = changedByPolicy
              .split(',')
              .map((s) => s.trim())
              .filter(Boolean)
              .map((item) => `- ${item.replace(':', ': ')}`)
              .join('\n');
            const pendingByPolicyList = pendingByPolicy
              .split(',')
              .map((s) => s.trim())
              .filter(Boolean)
              .map((item) => `- ${item.replace(':', ': ')}`)
              .join('\n');
            const legacyPendingByPolicyList = legacyPendingByPolicy
              .split(',')
              .map((s) => s.trim())
              .filter(Boolean)
              .map((item) => `- ${item.replace(':', ': ')}`)
              .join('\n');
            const fetchBlockedByPolicyList = fetchBlockedPendingByPolicy
              .split(',')
              .map((s) => s.trim())
              .filter(Boolean)
              .map((item) => `- ${item.replace(':', ': ')}`)
              .join('\n');
            const staleByPolicyList = stalePendingByPolicy
              .split(',')
              .map((s) => s.trim())
              .filter(Boolean)
              .map((item) => `- ${item.replace(':', ': ')}`)
              .join('\n');
            const volatileByPolicyList = volatilePendingByPolicy
              .split(',')
              .map((s) => s.trim())
              .filter(Boolean)
              .map((item) => `- ${item.replace(':', ': ')}`)
              .join('\n');
            const escalationByPolicyList = escalationByPolicy
              .split(',')
              .map((s) => s.trim())
              .filter(Boolean)
              .map((item) => `- ${item.replace(':', ': ')}`)
              .join('\n');
            const coverageGapByPolicyList = coverageGapByPolicy
              .split(',')
              .map((s) => s.trim())
              .filter(Boolean)
              .map((item) => `- ${item.replace(':', ': ')}`)
              .join('\n');
            const fetchFailureByPolicyList = fetchFailureByPolicy
              .split(',')
              .map((s) => s.trim())
              .filter(Boolean)
              .map((item) => `- ${item.replace(':', ': ')}`)
              .join('\n');
            const fallbackProbeByPolicyList = fallbackProbeByPolicy
              .split(',')
              .map((s) => s.trim())
              .filter(Boolean)
              .map((item) => `- ${item.replace(':', ': ')}`)
              .join('\n');
            const fallbackSignalByPolicyList = fallbackSignalByPolicy
              .split(',')
              .map((s) => s.trim())
              .filter(Boolean)
              .map((item) => `- ${item.replace(':', ': ')}`)
              .join('\n');
            const fallbackSignalActionableByPolicyList = fallbackSignalActionableByPolicy
              .split(',')
              .map((s) => s.trim())
              .filter(Boolean)
              .map((item) => `- ${item.replace(':', ': ')}`)
              .join('\n');
            const qualityGateHeldByPolicyList = qualityGateHeldByPolicy
              .split(',')
              .map((s) => s.trim())
              .filter(Boolean)
              .map((item) => `- ${item.replace(':', ': ')}`)
              .join('\n');
            const provisionalByPolicyList = provisionalByPolicy
              .split(',')
              .map((s) => s.trim())
              .filter(Boolean)
              .map((item) => `- ${item.replace(':', ': ')}`)
              .join('\n');
            const blockedRetryQueueByPolicyList = blockedRetryQueueByPolicy
              .split(',')
              .map((s) => s.trim())
              .filter(Boolean)
              .map((item) => `- ${item.replace(':', ': ')}`)
              .join('\n');
            const flakySourceByPolicyList = flakySourceByPolicy
              .split(',')
              .map((s) => s.trim())
              .filter(Boolean)
              .map((item) => `- ${item.replace(':', ': ')}`)
              .join('\n');

            const pendingDetailList = pendingDetail
              .split(';')
              .map((entry) => entry.trim())
              .filter(Boolean)
              .map((entry) => {
                const [policy, vendorsRaw] = entry.split(':');
                if (!policy || !vendorsRaw) return '';
                const vendors = vendorsRaw
                  .split('|')
                  .map((v) => v.trim())
                  .filter(Boolean)
                  .join(', ');
                return vendors ? `- ${policy}: ${vendors}` : '';
              })
              .filter(Boolean)
              .join('\n');

            const escalationDetailList = escalationDetail
              .split(';')
              .map((entry) => entry.trim())
              .filter(Boolean)
              .map((entry) => {
                const [policy, vendorsRaw] = entry.split(':');
                if (!policy || !vendorsRaw) return '';
                const vendors = vendorsRaw
                  .split('|')
                  .map((v) => v.trim())
                  .filter(Boolean)
                  .join(', ');
                return vendors ? `- ${policy}: ${vendors}` : '';
              })
              .filter(Boolean)
              .join('\n');

            const title = changedCount > 0
              ? `Policy changes (${today}): ${changedCount} vendor(s)`
              : `Policy checker pending candidates (${today}): ${pendingCount} candidate(s)`;
            const body = [
              "## Policy checker summary",
              "",
              `Policy changes: **${changedCount}**`,
              `Active pending candidates (needs confirmation): **${pendingCount}**`,
              `Legacy pending carried forward: **${legacyPendingCount}**`,
              `Fetch health: **${fetchHealthStatus}**`,
              `Fallback metadata probes available: **${fallbackProbeCount}**`,
              `Fallback metadata signals changed: **${fallbackSignalCount}**`,
              `Fallback metadata signals actionable: **${fallbackSignalActionableCount}**`,
              `Tier-1 coverage (gate set): **${tier1Fetched}/${tier1Total} (${tier1CoveragePct}%)**`,
              `All-vendor coverage: **${uniqueVendorFetched}/${uniqueVendorTotal} (${uniqueVendorCoveragePct}%)**`,
              `All-vendor fetch misses: **${uniqueVendorFailed}**`,
              `Provisional vendors: **${provisionalCount}**`,
              `Blocked retry queue: **${blockedRetryQueueCount}**`,
              `Flaky-source vendors tracked: **${flakySourceCount}**`,
              `Baseline comparison mode: **${baselineComparisonMode}**`,
              "",
              changedByPolicy ? "### By policy\n" + changedByPolicyList + "\n" : "",
              sampleList ? "### Confirmed sample (first 10)\n" + sampleList + "\n" : "",
              actualDiffSample ? `Policy diff sample: \`${actualDiffSample}\`\n` : "",
              pendingByPolicy ? "### Pending by policy\n" + pendingByPolicyList + "\n" : "",
              provisionalByPolicy ? "### Provisional by policy\n" + provisionalByPolicyList + "\n" : "",
              blockedRetryQueueByPolicy ? "### Blocked retry queue by policy\n" + blockedRetryQueueByPolicyList + "\n" : "",
              flakySourceByPolicy ? "### Flaky-source tracked by policy\n" + flakySourceByPolicyList + "\n" : "",
              pendingDetailList ? "### Pending vendors (first slice per policy)\n" + pendingDetailList + "\n" : "",
              pendingSample ? `Pending sample: \`${pendingSample}\`\n` : "",
              legacyPendingCount > 0 ? `### Legacy pending carried\n- Total: **${legacyPendingCount}**\n${legacyPendingByPolicyList}\n${legacyPendingSample ? `Sample: \`${legacyPendingSample}\`` : ""}\n` : "",
              fetchBlockedPendingCount > 0 ? `### Fetch-blocked pending\n- Total: **${fetchBlockedPendingCount}**\n${fetchBlockedByPolicyList}\n${fetchBlockedPendingSample ? `Sample: \`${fetchBlockedPendingSample}\`` : ""}\n` : "",
              stalePendingCount > 0 ? `### Stale pending (>=3 day(s))\n- Total: **${stalePendingCount}**\n${staleByPolicyList}\n${stalePendingSample ? `Sample: \`${stalePendingSample}\`` : ""}\n` : "",
              volatilePendingCount > 0 ? `### Volatile pending (flip_count threshold)\n- Total: **${volatilePendingCount}**\n${volatileByPolicyList}\n${volatilePendingSample ? `Sample: \`${volatilePendingSample}\`` : ""}\n` : "",
              qualityGateHeldCount > 0 ? `### Quality-gate held\n- Total: **${qualityGateHeldCount}**\n${qualityGateHeldByPolicyList}\n${qualityGateHeldSample ? `Sample: \`${qualityGateHeldSample}\`` : ""}\n` : "",
              escalationCount > 0 ? `### Escalation candidates (SLA)\n- Total: **${escalationCount}**\n${escalationByPolicyList}\n${escalationDetailList ? `${escalationDetailList}\n` : ""}${escalationSample ? `Sample: \`${escalationSample}\`` : ""}\n` : "",
              coverageGapCount > 0 ? `### Pending without confirm/escalation (coverage gap)\n- Total: **${coverageGapCount}**\n${coverageGapByPolicyList}\n${coverageGapSample ? `Sample: \`${coverageGapSample}\`` : ""}\n` : "",
              fetchFailureCount > 0 ? `### Fetch failures (degraded observability)\n- Total: **${fetchFailureCount}**\n${fetchFailureByPolicyList}\n${fetchFailureSample ? `Sample: \`${fetchFailureSample}\`` : ""}\n` : "",
              fallbackProbeCount > 0 ? `### Fallback probes (HEAD metadata)\n- Total: **${fallbackProbeCount}**\n${fallbackProbeByPolicyList}\n${fallbackProbeSample ? `Sample: \`${fallbackProbeSample}\`` : ""}\n` : "",
              fallbackSignalCount > 0 ? `### Fallback metadata signals changed (signal-only)\n- Total: **${fallbackSignalCount}**\n${fallbackSignalByPolicyList}\n${fallbackSignalSample ? `Sample: \`${fallbackSignalSample}\`` : ""}\n` : "",
              fallbackSignalActionableCount > 0 ? `### Fallback metadata signals actionable (strong headers changed in repeated blocked runs)\n- Total: **${fallbackSignalActionableCount}**\n${fallbackSignalActionableByPolicyList}\n${fallbackSignalActionableSample ? `Sample: \`${fallbackSignalActionableSample}\`` : ""}\n` : "",
              tier1ByPolicy ? `### Tier-1 coverage by policy\n- ${tier1ByPolicy.split(',').join('\n- ')}\n` : "",
              tier1Failed > 0 ? `Tier-1 failed vendors: \`${tier1FailedSample || 'sample unavailable'}\`\n` : "",
              tier1MissingConfiguredCount > 0 ? `Tier-1 config missing vendors: \`${tier1MissingConfiguredSample || 'sample unavailable'}\`\n` : "",
              "### Full review source",
              "- `rules/policy-change-candidates.json`",
              "- `rules/cancel-policy-change-candidates.json`",
              "- `rules/return-policy-change-candidates.json`",
              "- `rules/trial-policy-change-candidates.json`",
              "- `rules/policy-semantic-state.json`",
              "- `rules/cancel-policy-semantic-state.json`",
              "- `rules/return-policy-semantic-state.json`",
              "- `rules/trial-policy-semantic-state.json`",
              "- `rules/policy-alert-feed.json`",
              "- `rules/policy-alert-review-feed.json`",
              "- `rules/policy-events.ndjson`",
              "- `rules/policy-status-report.json`",
              "- `rules/policy-status-report.md`",
              "- `rules/policy-weekly-triage.json`",
              "- `rules/policy-weekly-triage.md`",
              "",
              "### Feed contract fields",
              `ACTUAL_CHANGED_COUNT=${changedCount}`,
              `ACTUAL_CHANGED_BY_POLICY=${changedByPolicy}`,
              `CHANGED_COUNT=${changedCount}`,
              `CHANGED_BY_POLICY=${changedByPolicy}`,
              "",
              `Run: https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              "",
              "This issue was created automatically by the daily policy checker."
            ].filter(Boolean).join("\n");

            try {
              const openPolicyIssues = await github.paginate(github.rest.issues.listForRepo, {
                owner: context.repo.owner,
                repo: context.repo.repo,
                state: 'open',
                labels: 'policy-update',
                per_page: 100
              });

              const dailyPrefixes = [
                changedTitlePrefix,
                pendingTitlePrefix,
                legacyMaterialChangedTitlePrefix,
                legacyPageCheckerPendingTitlePrefix,
                legacyPagesChangedTitlePrefix
              ];
              const existingToday = openPolicyIssues.find((issue) =>
                !issue.pull_request &&
                typeof issue.title === 'string' &&
                dailyPrefixes.some((prefix) => issue.title.startsWith(prefix))
              );

              if (existingToday) {
                await github.rest.issues.update({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: existingToday.number,
                  title,
                  body
                });
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: existingToday.number,
                  body: [
                    `New run update: https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
                    "",
                    `Policy changes: **${changedCount}**`,
                    `Pending candidates (needs confirmation): **${pendingCount}**`,
                    `Fetch health: **${fetchHealthStatus}**`,
                    `Fallback metadata probes available: **${fallbackProbeCount}**`,
                    `Fallback metadata signals changed: **${fallbackSignalCount}**`,
                    `Fallback metadata signals actionable: **${fallbackSignalActionableCount}**`,
                    `Tier-1 coverage (gate set): **${tier1Fetched}/${tier1Total} (${tier1CoveragePct}%)**`,
                    `All-vendor coverage: **${uniqueVendorFetched}/${uniqueVendorTotal} (${uniqueVendorCoveragePct}%)**`,
                    `All-vendor fetch misses: **${uniqueVendorFailed}**`,
                    `Provisional vendors: **${provisionalCount}**`,
                    `Blocked retry queue: **${blockedRetryQueueCount}**`,
                    `Flaky-source vendors tracked: **${flakySourceCount}**`,
                    `Baseline comparison mode: **${baselineComparisonMode}**`,
                    changedByPolicy ? `By policy: ${changedByPolicy}` : "",
                    pendingByPolicy ? `Pending by policy: ${pendingByPolicy}` : "",
                    provisionalByPolicy ? `Provisional by policy: ${provisionalByPolicy}` : "",
                    blockedRetryQueueByPolicy ? `Blocked retry queue by policy: ${blockedRetryQueueByPolicy}` : "",
                    flakySourceByPolicy ? `Flaky-source by policy: ${flakySourceByPolicy}` : "",
                    pendingDetail ? `Pending detail: ${pendingDetail}` : "",
                    stalePendingCount > 0 ? `Stale pending: ${stalePendingCount} (${stalePendingByPolicy || 'by-policy-unavailable'})` : "",
                    volatilePendingCount > 0 ? `Volatile pending: ${volatilePendingCount} (${volatilePendingByPolicy || 'by-policy-unavailable'})` : "",
                    escalationCount > 0 ? `Escalation candidates: ${escalationCount} (${escalationByPolicy || 'by-policy-unavailable'})` : "",
                    escalationDetail ? `Escalation detail: ${escalationDetail}` : "",
                    coverageGapCount > 0 ? `Coverage gaps: ${coverageGapCount} (${coverageGapByPolicy || 'by-policy-unavailable'})` : "",
                    fetchFailureCount > 0 ? `Fetch failures: ${fetchFailureCount} (${fetchFailureByPolicy || 'by-policy-unavailable'})` : "",
                    fallbackProbeCount > 0 ? `Fallback probes: ${fallbackProbeCount} (${fallbackProbeByPolicy || 'by-policy-unavailable'})` : "",
                    fallbackSignalCount > 0 ? `Fallback signals changed: ${fallbackSignalCount} (${fallbackSignalByPolicy || 'by-policy-unavailable'})` : "",
                    fallbackSignalActionableCount > 0 ? `Fallback signals actionable: ${fallbackSignalActionableCount} (${fallbackSignalActionableByPolicy || 'by-policy-unavailable'})` : "",
                    tier1ByPolicy ? `Tier-1 by policy: ${tier1ByPolicy}` : "",
                    tier1Failed > 0 ? `Tier-1 failed sample: ${tier1FailedSample || 'sample-unavailable'}` : "",
                    tier1MissingConfiguredCount > 0 ? `Tier-1 missing-configured sample: ${tier1MissingConfiguredSample || 'sample-unavailable'}` : "",
                    changedSample ? `Policy-change sample: ${changedSample}` : "",
                    actualDiffSample ? `Policy diff sample: ${actualDiffSample}` : "",
                    escalationSample ? `Escalation sample: ${escalationSample}` : "",
                    coverageGapSample ? `Coverage gap sample: ${coverageGapSample}` : "",
                    fetchFailureSample ? `Fetch failure sample: ${fetchFailureSample}` : "",
                    fallbackProbeSample ? `Fallback probe sample: ${fallbackProbeSample}` : "",
                    fallbackSignalSample ? `Fallback signal sample: ${fallbackSignalSample}` : "",
                    fallbackSignalActionableSample ? `Fallback actionable signal sample: ${fallbackSignalActionableSample}` : "",
                    pendingSample ? `Pending sample: ${pendingSample}` : ""
                  ].filter(Boolean).join("\n")
                });
                console.log(`::notice::Updated existing policy issue #${existingToday.number} for ${today}.`);
                return;
              }

              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ['policy-update']
              });
            } catch (error) {
              const status = error?.status || "unknown";
              const message = error?.message || "unknown error";
              console.log(`::warning::Could not open policy update issue (status: ${status}): ${message}`);
            }

      - name: Open escalation issue if SLA thresholds are hit
        if: env.POLICY_CHECK_PUBLIC_ISSUES_ENABLED == '1' && steps.check.outputs.contract_valid == '1' && ((steps.check.outputs.escalation_count && steps.check.outputs.escalation_count != '0') || (steps.check.outputs.coverage_gap_count && steps.check.outputs.coverage_gap_count != '0'))
        continue-on-error: true
        uses: actions/github-script@v7
        env:
          ESCALATION_COUNT: ${{ steps.check.outputs.escalation_count }}
          ESCALATION_BY_POLICY: ${{ steps.check.outputs.escalation_by_policy }}
          ESCALATION_SAMPLE: ${{ steps.check.outputs.escalation_sample }}
          ESCALATION_DETAIL: ${{ steps.check.outputs.escalation_detail }}
          COVERAGE_GAP_COUNT: ${{ steps.check.outputs.coverage_gap_count }}
          COVERAGE_GAP_BY_POLICY: ${{ steps.check.outputs.coverage_gap_by_policy }}
          COVERAGE_GAP_SAMPLE: ${{ steps.check.outputs.coverage_gap_sample }}
        with:
          retries: 3
          script: |
            const escalationCount = Number.parseInt(process.env.ESCALATION_COUNT || '0', 10) || 0;
            const escalationByPolicy = process.env.ESCALATION_BY_POLICY || '';
            const escalationSample = process.env.ESCALATION_SAMPLE || '';
            const escalationDetail = process.env.ESCALATION_DETAIL || '';
            const coverageGapCount = Number.parseInt(process.env.COVERAGE_GAP_COUNT || '0', 10) || 0;
            const coverageGapByPolicy = process.env.COVERAGE_GAP_BY_POLICY || '';
            const coverageGapSample = process.env.COVERAGE_GAP_SAMPLE || '';
            const today = new Date().toISOString().split('T')[0];
            const titlePrefix = `Policy checker escalation (${today}):`;
            const title = `${titlePrefix} ${escalationCount} escalated, ${coverageGapCount} coverage-gap vendor(s)`;
            const body = [
              "## Policy checker escalation summary",
              "",
              `Escalated pending vendors: **${escalationCount}**`,
              escalationByPolicy ? `By policy: ${escalationByPolicy}` : "",
              escalationDetail ? `Detail: ${escalationDetail}` : "",
              escalationSample ? `Sample: \`${escalationSample}\`` : "",
              "",
              `Coverage-gap pending vendors: **${coverageGapCount}**`,
              coverageGapByPolicy ? `By policy: ${coverageGapByPolicy}` : "",
              coverageGapSample ? `Sample: \`${coverageGapSample}\`` : "",
              "",
              "### Tracking files",
              "- `rules/policy-coverage-state.json`",
              "- `rules/cancel-policy-coverage-state.json`",
              "- `rules/return-policy-coverage-state.json`",
              "- `rules/trial-policy-coverage-state.json`",
              "",
              `Run: https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              "",
              "This issue was created automatically by the daily policy checker escalation logic."
            ].filter(Boolean).join("\n");

            try {
              const openEscalationIssues = await github.paginate(github.rest.issues.listForRepo, {
                owner: context.repo.owner,
                repo: context.repo.repo,
                state: 'open',
                labels: 'policy-escalation',
                per_page: 100
              });

              const existingToday = openEscalationIssues.find((issue) =>
                !issue.pull_request &&
                typeof issue.title === 'string' &&
                issue.title.startsWith(titlePrefix)
              );

              if (existingToday) {
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: existingToday.number,
                  body: [
                    `New run update: https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
                    "",
                    `Escalated pending vendors: **${escalationCount}**`,
                    escalationByPolicy ? `Escalated by policy: ${escalationByPolicy}` : "",
                    escalationDetail ? `Escalated detail: ${escalationDetail}` : "",
                    `Coverage-gap pending vendors: **${coverageGapCount}**`,
                    coverageGapByPolicy ? `Coverage-gap by policy: ${coverageGapByPolicy}` : "",
                    escalationSample ? `Escalation sample: ${escalationSample}` : "",
                    coverageGapSample ? `Coverage-gap sample: ${coverageGapSample}` : ""
                  ].filter(Boolean).join("\n")
                });
                console.log(`::notice::Updated existing escalation issue #${existingToday.number} for ${today}.`);
                return;
              }

              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ['policy-update', 'policy-escalation']
              });
            } catch (error) {
              const status = error?.status || "unknown";
              const message = error?.message || "unknown error";
              console.log(`::warning::Could not open policy escalation issue (status: ${status}): ${message}`);
            }

      - name: Enforce Tier-1 coverage gate
        env:
          POLICY_CHECK_TIER1_GATE_ENABLED: ${{ vars.POLICY_CHECK_TIER1_GATE_ENABLED || '0' }}
          POLICY_CHECK_TIER1_MIN_COVERAGE_PCT: ${{ vars.POLICY_CHECK_TIER1_MIN_COVERAGE_PCT || '95.00' }}
          POLICY_CHECK_TIER1_MAX_FAILED: ${{ vars.POLICY_CHECK_TIER1_MAX_FAILED || '1' }}
          TIER1_TOTAL: ${{ steps.check.outputs.tier1_total }}
          TIER1_FETCHED: ${{ steps.check.outputs.tier1_fetched }}
          TIER1_FAILED: ${{ steps.check.outputs.tier1_failed }}
          TIER1_COVERAGE_PCT: ${{ steps.check.outputs.tier1_coverage_pct }}
          TIER1_BY_POLICY: ${{ steps.check.outputs.tier1_by_policy }}
          TIER1_FAILED_SAMPLE: ${{ steps.check.outputs.tier1_failed_sample }}
          TIER1_MISSING_CONFIGURED_COUNT: ${{ steps.check.outputs.tier1_missing_configured_count }}
          TIER1_MISSING_CONFIGURED_SAMPLE: ${{ steps.check.outputs.tier1_missing_configured_sample }}
        run: |
          enabled="$(echo "${POLICY_CHECK_TIER1_GATE_ENABLED:-0}" | tr '[:upper:]' '[:lower:]')"
          if [ "$enabled" != "1" ] && [ "$enabled" != "true" ] && [ "$enabled" != "yes" ]; then
            echo "Tier-1 gate disabled (POLICY_CHECK_TIER1_GATE_ENABLED=${POLICY_CHECK_TIER1_GATE_ENABLED:-0})."
            exit 0
          fi

          total="${TIER1_TOTAL:-0}"
          fetched="${TIER1_FETCHED:-0}"
          failed="${TIER1_FAILED:-0}"
          coverage="${TIER1_COVERAGE_PCT:-0.00}"
          min_coverage="${POLICY_CHECK_TIER1_MIN_COVERAGE_PCT:-95.00}"
          max_failed="${POLICY_CHECK_TIER1_MAX_FAILED:-1}"

          echo "Tier-1 coverage summary: fetched=${fetched}/${total}, failed=${failed}, coverage=${coverage}%"
          echo "Tier-1 by policy: ${TIER1_BY_POLICY:-n/a}"

          if [ "${TIER1_MISSING_CONFIGURED_COUNT:-0}" -gt 0 ]; then
            echo "::warning::Tier-1 config includes unknown vendors (${TIER1_MISSING_CONFIGURED_COUNT}): ${TIER1_MISSING_CONFIGURED_SAMPLE}"
          fi

          if [ "$total" -le 0 ]; then
            echo "::error::Tier-1 gate enabled but no Tier-1 vendors were resolved. Check rules/policy-tier1-vendors.json."
            exit 1
          fi

          should_fail=0

          if awk "BEGIN {exit !(${coverage} < ${min_coverage})}"; then
            echo "::error::Tier-1 coverage ${coverage}% is below required ${min_coverage}%."
            should_fail=1
          fi

          if [ "$failed" -gt "$max_failed" ]; then
            echo "::error::Tier-1 failed vendors ${failed} exceeds max allowed ${max_failed}. Sample: ${TIER1_FAILED_SAMPLE:-n/a}"
            should_fail=1
          fi

          if [ "$should_fail" -ne 0 ]; then
            exit 1
          fi

          echo "Tier-1 gate passed."
