name: Inventory Freshness

on:
  pull_request:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  inventory-freshness:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Install inventory tooling
        run: |
          if ! command -v rg >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y ripgrep
          fi

      - name: Check generated inventory docs are fresh
        run: |
          chmod +x ./scripts/generate-project-inventory.sh ./scripts/check-project-inventory.sh
          ./scripts/check-project-inventory.sh
